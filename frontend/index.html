<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSheet Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo"><div class="mark">♪</div><span class="name">ChordSheet Studio</span></div>

  <div class="search-group">
    <input id="searchTitle" type="search" placeholder="Search by title…" autocomplete="off">
    <input id="searchArtist" type="search" placeholder="Search by artist…" autocomplete="off">
    <button class="btn btn-ghost" id="searchBtn">Search</button>
  </div>

  <div class="spacer"></div>

  <div class="transpose-group" id="transposeGroup">
    <span class="tg-label">Key</span>
    <select id="keySelect" aria-label="Transpose to key">
      <option value="">—</option>
    </select>
    <button class="btn btn-ghost btn-step" id="stepDown" title="Down a half step">−</button>
    <button class="btn btn-ghost btn-step" id="stepUp" title="Up a half step">+</button>
  </div>

  <button class="btn btn-primary" id="pdfBtn">Download PDF</button>
</header>

<div class="search-results" id="searchResults" hidden>
  <div class="sr-inner" id="srInner"></div>
</div>

<main>
  <div class="pane editor-pane active" id="editorPane">
    <div class="pane-label">Editor — ChordPro format</div>
    <textarea id="editor" spellcheck="false" placeholder="Search for a song above, or start typing:

{title: Song Name}
{key: G}

Verse 1
[G]Type lyrics with [C]chords in brackets..."></textarea>
  </div>

  <div class="pane preview-pane" id="previewPane">
    <div class="pane-label">Preview</div>
    <div class="preview-scroll">
      <div class="paper" id="paper"></div>
    </div>
  </div>
</main>

<div class="tab-bar">
  <button id="tabEditor" class="on">Editor</button>
  <button id="tabPreview">Preview</button>
</div>

<div class="toast" id="toast" role="status"></div>

<script src="js/api.js"></script>
<script src="js/parser.js"></script>
<script src="js/preview.js"></script>
<script src="js/pdf.js"></script>
<script src="js/search.js"></script>
<script src="js/transpose.js"></script>
<script src="js/main.js"></script>
</body>
</html>
